<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Dinkes | SEHATI-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-teal-100 rounded-lg flex items-center justify-center text-teal-600">
                <i class="fas fa-shield-alt text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Panel Admin Dinkes</h1>
                <p class="text-xs text-slate-500">Manajemen Akses SEHATI-AI</p>
            </div>
        </div>
        <button onclick="window.location.href='GEYWAY.html'" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-md hover:bg-slate-200 text-sm font-semibold transition">
            <i class="fas fa-sign-out-alt mr-2"></i>Keluar
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-6 mt-6">
        
        <!-- Filter & Info -->
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
            <div class="flex gap-4">
                <button onclick="loadFaskes('pending')" class="px-4 py-2 bg-amber-50 text-amber-600 border border-amber-200 rounded-lg text-sm font-bold hover:bg-amber-100 transition focus:ring-2 focus:ring-amber-500">
                    <i class="fas fa-clock mr-2"></i>Menunggu Persetujuan (Pending)
                </button>
                <button onclick="loadFaskes('approved')" class="px-4 py-2 bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-lg text-sm font-bold hover:bg-emerald-100 transition focus:ring-2 focus:ring-emerald-500">
                    <i class="fas fa-check-circle mr-2"></i>Sudah Aktif (Approved)
                </button>
            </div>
            <div class="text-sm font-semibold text-slate-500">
                Status Menampilkan: <span id="status-label" class="text-slate-800 uppercase">Pending</span>
            </div>
        </div>

        <!-- Tabel Data -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4 font-semibold">Kategori</th>
                            <th class="p-4 font-semibold">Email / ID Faskes</th>
                            <th class="p-4 font-semibold">Tanggal Daftar</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold text-center">Aksi (Admin)</th>
                        </tr>
                    </thead>
                    <tbody id="faskes-table-body" class="divide-y divide-slate-100">
                        <!-- Data akan dimuat di sini oleh Javascript -->
                        <tr><td colspan="5" class="p-8 text-center text-slate-400">Memuat data dari Firebase...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- MESIN FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Konfigurasi Sama dengan GEYWAY.html
        const firebaseConfig = {
            apiKey: "AIzaSyD4oU8FaCptnhcnJbivKMHQgQaKFEcYCrc",
            authDomain: "sehati-ai-c5252.firebaseapp.com",
            projectId: "sehati-ai-c5252",
            storageBucket: "sehati-ai-c5252.firebasestorage.app",
            messagingSenderId: "942501510198",
            appId: "1:942501510198:web:3073fdab4a36b84f736c97"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentStatusFilter = 'pending';

        // FUNGSI MEMUAT DATA
        window.loadFaskes = async function(statusFilter = 'pending') {
            currentStatusFilter = statusFilter;
            document.getElementById('status-label').innerText = statusFilter;
            const tbody = document.getElementById('faskes-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>Mengambil data...</td></tr>';

            try {
                // Tarik data dari koleksi "faskes" yang statusnya sesuai filter
                const q = query(collection(db, "faskes"), where("status", "==", statusFilter));
                const querySnapshot = await getDocs(q);
                
                tbody.innerHTML = ''; // Kosongkan tabel
                
                if (querySnapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400 font-medium">Tidak ada faskes dengan status "${statusFilter}" saat ini.</td></tr>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const docId = docSnap.id; // Ini biasanya sama dengan UID User
                    
                    // Format Tanggal sederhana
                    let tglDaftar = "-";
                    if(data.created_at) {
                        tglDaftar = data.created_at.toDate ? data.created_at.toDate().toLocaleDateString('id-ID') : new Date(data.created_at).toLocaleDateString('id-ID');
                    }

                    // Tentukan warna badge status
                    const statusBadge = data.status === 'pending' 
                        ? '<span class="px-2 py-1 bg-amber-100 text-amber-700 rounded-md text-xs font-bold uppercase">Pending</span>'
                        : '<span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-md text-xs font-bold uppercase">Approved</span>';

                    // Tombol Aksi (Hanya munculkan tombol Approve jika masih pending)
                    let actionButtons = '';
                    if (data.status === 'pending') {
                        actionButtons += `<button onclick="approveFaskes('${docId}')" class="px-3 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded text-xs font-bold shadow-sm transition mr-2"><i class="fas fa-check mr-1"></i> Setujui (Approve)</button>`;
                    }
                    actionButtons += `<button onclick="deleteFaskes('${docId}')" class="px-3 py-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 rounded text-xs font-bold transition"><i class="fas fa-trash-alt"></i> Hapus</button>`;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition border-b border-slate-50 last:border-0";
                    tr.innerHTML = `
                        <td class="p-4"><span class="font-semibold text-slate-700">${data.kategori || '-'}</span></td>
                        <td class="p-4 text-sm">${data.email}</td>
                        <td class="p-4 text-sm text-slate-500">${tglDaftar}</td>
                        <td class="p-4">${statusBadge}</td>
                        <td class="p-4 text-center">${actionButtons}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error loading data:", error);
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-rose-500 font-medium">Gagal memuat data. Cek koneksi atau Rules Firebase.</td></tr>`;
            }
        }

        // FUNGSI APPROVE
        window.approveFaskes = async function(docId) {
            if(!confirm("Anda yakin ingin MENGAKTIFKAN akses faskes ini?")) return;
            
            try {
                await updateDoc(doc(db, "faskes", docId), {
                    status: "approved"
                });
                alert("Berhasil! Faskes sekarang sudah bisa Login.");
                loadFaskes(currentStatusFilter); // Refresh tabel
            } catch (error) {
                alert("Gagal menyetujui: " + error.message);
            }
        }

        // FUNGSI DELETE (Menghapus profil dari Firestore)
        window.deleteFaskes = async function(docId) {
            if(!confirm("PERINGATAN: Anda yakin ingin MENGHAPUS data faskes ini secara permanen?")) return;
            
            try {
                // Ini menghapus data profil di Firestore
                await deleteDoc(doc(db, "faskes", docId));
                alert("Data profil faskes berhasil dihapus dari database.");
                loadFaskes(currentStatusFilter); // Refresh tabel
                
                // CATATAN PENTING UNTUK ADMIN:
                // Menghapus data di sini tidak otomatis menghapus email & password di tab "Authentication" Firebase Console.
                // Jika ingin menghapus login-nya secara total, admin harus tetap menghapusnya dari Firebase Console > Authentication > Users.
            } catch (error) {
                alert("Gagal menghapus: " + error.message);
            }
        }

        // Muat otomatis tab 'pending' saat halaman pertama kali dibuka
        window.onload = () => loadFaskes('pending');
    </script>
</body>
</html>
