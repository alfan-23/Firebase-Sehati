<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Tembak Data SEHATI-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
        <h1 class="text-2xl font-bold text-sky-400 mb-2">🔥 Mesin Injector Data Faskes</h1>
        <p class="text-slate-400 text-sm mb-6">Alat ini akan mendaftarkan email & password ke Authentication, lalu menyimpan profilnya ke Database dengan status <b>APPROVED</b> secara otomatis.</p>

        <label class="block text-sm font-semibold text-slate-300 mb-2">Paste Data JSON di sini:</label>
        <textarea id="jsonInput" class="w-full h-64 p-4 bg-slate-950 border border-slate-600 rounded-xl text-green-400 font-mono text-xs focus:ring-2 focus:ring-sky-500 outline-none mb-4" placeholder='[\n  {\n    "kategori": "Puskesmas",\n    "unitKerja": "Puskesmas A",\n    "email": "pkm.a@gmail.com",\n    "password": "password123"\n  }\n]'></textarea>

        <button onclick="mulaiTembak()" id="btnInject" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 rounded-xl font-bold text-lg shadow-lg shadow-emerald-500/20 transition-all">
            🚀 MULAI TEMBAK DATA
        </button>

        <div class="mt-6 bg-slate-900 p-4 rounded-xl border border-slate-700">
            <h3 class="font-bold text-slate-300 mb-2 text-sm">Status Proses:</h3>
            <div id="logArea" class="h-40 overflow-y-auto text-xs font-mono space-y-1 text-slate-400">
                Menunggu perintah...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4oU8FaCptnhcnJbivKMHQgQaKFEcYCrc",
            authDomain: "sehati-ai-c5252.firebaseapp.com",
            projectId: "sehati-ai-c5252",
            storageBucket: "sehati-ai-c5252.firebasestorage.app",
            messagingSenderId: "942501510198",
            appId: "1:942501510198:web:3073fdab4a36b84f736c97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function addLog(text, isError = false) {
            const logArea = document.getElementById('logArea');
            const color = isError ? 'text-rose-400' : 'text-emerald-400';
            logArea.innerHTML += `<div class="${color}">> ${text}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        window.mulaiTembak = async function() {
            const jsonText = document.getElementById('jsonInput').value;
            const btn = document.getElementById('btnInject');
            let dataArray = [];

            try {
                dataArray = JSON.parse(jsonText);
            } catch (e) {
                alert("Format JSON tidak valid! Cek kembali titik koma dan kutipnya.");
                return;
            }

            if(!confirm(`Siap menembakkan ${dataArray.length} data ke Firebase?`)) return;

            btn.disabled = true;
            btn.innerHTML = "⏳ SEDANG PROSES...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            addLog(`Memulai injeksi ${dataArray.length} faskes...`);

            let sukses = 0;
            let gagal = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const faskes = dataArray[i];
                try {
                    // 1. Tembak ke Authentication (Buat Email & Pass)
                    const userCred = await createUserWithEmailAndPassword(auth, faskes.email, faskes.password);
                    
                    // 2. Tembak ke Firestore (Profil otomatis 'approved')
                    await setDoc(doc(db, "faskes", userCred.user.uid), {
                        email: faskes.email,
                        kategori: faskes.kategori,
                        unitKerja: faskes.unitKerja,
                        status: "approved", // Langsung disetujui
                        created_at: new Date()
                    });
                    
                    sukses++;
                    addLog(`[SUKSES] ${faskes.unitKerja} (${faskes.email})`);
                } catch (error) {
                    gagal++;
                    if (error.code === 'auth/email-already-in-use') {
                        addLog(`[LEWAT] ${faskes.email} sudah ada di database.`, true);
                    } else {
                        addLog(`[GAGAL] ${faskes.email} - ${error.message}`, true);
                    }
                }
            }

            // Logout user terakhir karena auth otomatis login saat create
            await signOut(auth);

            addLog(`--- SELESAI ---`);
            addLog(`Total Sukses: ${sukses} | Total Gagal/Lewat: ${gagal}`);
            
            btn.innerHTML = "✅ PROSES SELESAI";
            alert(`Injeksi Selesai! ${sukses} faskes berhasil ditambahkan dan langsung aktif.`);
        };
    </script>
</body>
</html>
