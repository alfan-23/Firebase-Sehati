<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEHATI - AI | Login Fasyankes</title>
    
    <script>
        (function() {
            const allowedDomain = "alfan-23.github.io";
            const currentDomain = window.location.hostname;
            if (currentDomain !== allowedDomain && currentDomain !== "localhost" && currentDomain !== "127.0.0.1") {
                document.documentElement.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#0f172a; color:#38bdf8; font-family:sans-serif; text-align:center; padding:20px;">
                        <div>
                            <h1 style="font-size:1.8rem; margin-bottom:10px;">⚠️ LISENSI TIDAK VALID</h1>
                            <p>Akses hanya diizinkan melalui domain resmi: <b>${allowedDomain}</b></p>
                        </div>
                    </div>`;
                throw new Error("Unauthorized Access");
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #14b8a6;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2);
            outline: none;
        }

        /* Abstract Shapes */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        
        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(20, 184, 166, 0.15); /* Teal */
            top: -100px;
            left: -100px;
            border-radius: 50%;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: rgba(16, 185, 129, 0.1); /* Emerald */
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 50px) scale(0.9); }
        }

        .loader-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            border-radius: inherit;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(20, 184, 166, 0.3);
            border-radius: 50%;
            border-top-color: #14b8a6;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        select option {
            background-color: #1e293b;
            color: white;
        }
    </style>
</head>
<body class="p-4 sm:p-6 lg:p-8">

    <!-- Background Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="w-full max-w-md w-full glass-panel rounded-3xl p-8 relative">
        
        <!-- Loader -->
        <div id="loader" class="loader-overlay hidden rounded-3xl">
            <div class="spinner mb-4"></div>
            <p class="text-teal-400 font-semibold animate-pulse text-sm" id="loader-text">Menghubungkan ke Database...</p>
        </div>

        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-teal-500/20 to-emerald-500/20 border border-teal-500/30 mb-4 shadow-lg shadow-teal-500/10">
                <i class="fas fa-heartbeat text-2xl text-teal-400"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-300 tracking-tight mb-2">
                SEHATI - AI
            </h1>
            <p class="text-slate-400 text-sm font-medium">Sistem Evaluasi Mutu & Layanan Fasyankes</p>
        </div>

        <!-- Form -->
        <form class="space-y-6">
            
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-300 ml-1">Kategori Fasyankes</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-hospital text-slate-400"></i>
                    </div>
                    <select id="loginFasyankes" required class="input-glass w-full pl-11 pr-4 py-3.5 rounded-xl text-sm appearance-none cursor-pointer">
                        <option value="" disabled selected>Pilih Kategori...</option>
                        <option value="Dinkes">Dinas Kesehatan (Admin)</option>
                        <option value="Puskesmas">Puskesmas</option>
                        <option value="Klinik">Klinik</option>
                        <option value="Rumah Sakit">Rumah Sakit</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <i class="fas fa-chevron-down text-slate-400 text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-300 ml-1">Email / Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-slate-400"></i>
                    </div>
                    <input id="loginEmail" type="email" required placeholder="Masukkan email terdaftar" 
                           class="input-glass w-full pl-11 pr-4 py-3.5 rounded-xl text-sm placeholder-slate-500">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input id="loginPassword" type="password" required placeholder="••••••••" 
                           class="input-glass w-full pl-11 pr-12 py-3.5 rounded-xl text-sm placeholder-slate-500">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <button type="button" onclick="window.togglePassword('loginPassword', 'eyeIcon')" class="text-slate-400 hover:text-teal-400 focus:outline-none p-2 transition-colors">
                            <i id="eyeIcon" class="fas fa-eye-slash text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="pt-2 space-y-3">
                <button type="button" onclick="window.handleLogin(event)" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-teal-900/50 text-sm font-bold text-white bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-400 hover:to-emerald-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 focus:ring-offset-slate-900 transition-all duration-300 transform hover:-translate-y-0.5">
                    <i class="fas fa-sign-in-alt mr-2 mt-1"></i> Masuk ke Sistem
                </button>
                
                <button type="button" onclick="window.handleSignup(event)" class="w-full flex justify-center py-3 px-4 border border-teal-500/50 rounded-xl text-sm font-bold text-teal-400 bg-transparent hover:bg-teal-500/10 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 focus:ring-offset-slate-900 transition-all duration-300">
                    <i class="fas fa-user-plus mr-2 mt-1"></i> Daftar Fasyankes Baru
                </button>
            </div>
            
        </form>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-500 font-medium">
                Dilindungi oleh Sistem Keamanan Terpusat<br>
                Dinas Kesehatan &copy; 2026
            </p>
        </div>
    </div>

    <!-- PENGGUNAAN TYPE MODULE UNTUK FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Konfigurasi Firebase dari akun Anda
        const firebaseConfig = {
            apiKey: "AIzaSyD4oU8FaCptnhcnJbivKMHQgQaKFEcYCrc",
            authDomain: "sehati-ai-c5252.firebaseapp.com",
            projectId: "sehati-ai-c5252",
            storageBucket: "sehati-ai-c5252.firebasestorage.app",
            messagingSenderId: "942501510198",
            appId: "1:942501510198:web:3073fdab4a36b84f736c97"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Fungsi Tampilkan/Sembunyikan Password
        window.togglePassword = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }
        }

        // Fungsi LOGIN
        window.handleLogin = async function(e) {
            e.preventDefault();
            
            const fasyankes = document.getElementById('loginFasyankes').value;
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;

            if(!email || !pass || !fasyankes) {
                alert("Harap lengkapi Kategori, Email, dan Password.");
                return;
            }

            document.getElementById('loader-text').innerText = "Memverifikasi Akses...";
            document.getElementById('loader').classList.remove('hidden');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "faskes", userCredential.user.uid));

                if (userDoc.exists()) {
                    const data = userDoc.data();
                    
                    if (data.status === "DISETUJUI" || data.status === "approved") {
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('unitKerja', data.unitKerja || email);
                        sessionStorage.setItem('kategori', data.kategori || fasyankes);
                        
                        // KITA UBAH REDIRECT-NYA KE iframe.html AGAR BISA MASUK DASHBOARD
                        window.location.href = 'iframe.html'; 
                    } else {
                        alert("Akses Ditolak: Akun Anda berstatus PENDING. Silakan tunggu persetujuan Admin Dinkes.");
                        await signOut(auth); // Langsung logout jika belum disetujui
                    }
                } else {
                    alert("Akses Ditolak: Data Fasyankes tidak ditemukan di Database.");
                    await signOut(auth);
                }
            } catch (err) {
                let errorMsg = "Koneksi Gagal.";
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
                    errorMsg = "Email atau Password Salah!";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg = "Format Email tidak valid.";
                }
                alert("Akses Ditolak: " + errorMsg);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // Fungsi SIGN UP MANDIRI
        window.handleSignup = async function(e) {
            e.preventDefault();
            
            const fasyankes = document.getElementById('loginFasyankes').value;
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;

            if(!email || !pass || !fasyankes) {
                alert("Untuk mendaftar, harap pilih Kategori Fasyankes, isi Email dan buat Password.");
                return;
            }
            if(pass.length < 6) {
                alert("Password minimal harus 6 karakter.");
                return;
            }

            document.getElementById('loader-text').innerText = "Mendaftarkan Fasyankes...";
            document.getElementById('loader').classList.remove('hidden');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                
                await setDoc(doc(db, "faskes", userCredential.user.uid), {
                    email: email,
                    kategori: fasyankes,
                    unitKerja: email, 
                    status: "pending", 
                    created_at: new Date()
                });

                alert("Pendaftaran Berhasil!\n\nStatus akun Anda saat ini PENDING. Silakan hubungi Admin Dinkes untuk persetujuan sebelum bisa Masuk ke Sistem.");
                await signOut(auth); 
                
            } catch (err) {
                let errorMsg = err.message;
                if (err.code === 'auth/email-already-in-use') {
                    errorMsg = "Email sudah terdaftar. Silakan langsung Masuk ke Sistem.";
                }
                alert("Pendaftaran Gagal: " + errorMsg);
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
